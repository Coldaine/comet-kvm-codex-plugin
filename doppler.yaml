# Doppler project config — safe to commit (names only, no secrets)
#
# All secrets live in the secrets_managment project, config dev.
#
# Secrets injected by doppler run:
#   GLCOMET_ADMIN_PASSWORD  — Comet KVM admin password (required)
#   OPENAI_MANAGEMENT_KEY   — OpenAI API key for VLM perception (required for VLM_PROVIDER!=mock)
#
# Non-sensitive (safe in code/config):
#   COMET_HOST     = 192.168.0.126       (LAN IP)
#   COMET_USERNAME = admin               (default)
#   VLM_PROVIDER   = openrouter | ollama | mock
#   VLM_BASE_URL   = http://localhost:11434   (local Ollama/vLLM)
#   VLM_MODEL      = e.g. openrouter/qwen/qwen-2-vl-72b-instruct or ollama/llama3.2-vision
#
# Run: doppler run -- uv run glkvm_mcp.py
# Run: doppler run -- uv run scripts/comet_smoke_test.py

setup:
  project: secrets_managment
  config: dev

flags:
  analytics: false
  env-warning: false
  update-check: false
