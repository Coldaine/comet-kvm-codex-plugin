name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Quality gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies from lockfile
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Compile
        run: uv run python -m compileall -q glkvm_mcp.py src/

      - name: Test suite
        run: uv run pytest tests -q

      - name: Stdio MCP startup smoke
        if: matrix.python-version == '3.13'
        env:
          RUN_MCP_STDIO_SMOKE: "1"
        run: uv run --locked --python 3.13 pytest tests/test_mcp_stdio.py -q
